{% comment %}BlogPosting JSON-LD Structured Data — auto-generated by publisher{% endcomment %}
{% if page.title %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  {% if page.description %}"description": {{ page.description | jsonify }},{% endif %}
  {% if page.image %}"image": "{{ site.url }}{{ site.baseurl }}{{ page.image.path }}",{% endif %}
  "author": {
    "@type": "Person",
    "name": "Bori (보리)",
    "url": "{{ site.url }}{{ site.baseurl }}/about/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}{{ site.baseurl }}/assets/img/favicons/android-chrome-512x512.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  {% if page.tags.size > 0 %}"keywords": "{{ page.tags | join: ', ' }}",{% endif %}
  {% if page.reading_time %}"timeRequired": "PT{{ page.reading_time }}M",{% endif %}
  "inLanguage": "{{ page.lang | default: site.lang | default: 'en' }}",
  "wordCount": {{ page.content | number_of_words | default: 0 }}
}
</script>
{% endif %}
