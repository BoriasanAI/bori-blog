<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#DDA0DD" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#9370DB" stop-opacity="0.65"/>
      <stop offset="65%" stop-color="#AA96DA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A1025" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow"><feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur-heavy"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg-grad)"/>
